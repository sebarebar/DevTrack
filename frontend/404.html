<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTrack</title>
  <script>
    sessionStorage.setItem('spa-redirect', location.pathname + location.search + location.hash);
    var isPages = location.hostname.indexOf('github.io') !== -1;
    if (isPages) {
      var parts = location.pathname.split('/');
      location.replace('/' + parts[1] + '/');
    } else {
      location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
