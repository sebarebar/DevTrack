<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'header-dark': '#1e3a5f',
                    }
                }
            }
        }
    </script>
    <style>
        #mobile-menu {
            transition: transform 0.3s ease-in-out;
        }
        .menu-open {
            transform: translateX(0) !important;
        }
        .menu-closed {
            transform: translateX(100%);
        }
        /* Smooth line chart */
        .chart-container {
            position: relative;
            height: 120px;
            width: 100%;
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">
    <header class="bg-header-dark text-white sticky top-0 z-40 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" data-route class="flex items-center space-x-2">
                <img src="/favicon.svg" alt="Logo Devtrack" class="w-8 h-8 object-contain">
                <span class="text-xl font-bold">devtrack</span>
            </a>
            <button id="menu-btn" class="p-2 rounded-lg hover:bg-white/10 focus:outline-none transition-colors">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </header>

    <div id="menu-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden"></div>

    <nav id="mobile-menu" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-gray-800 shadow-xl z-50 menu-closed overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-end mb-8">
                <button id="close-menu" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-6 h-6 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="mb-8 p-4 bg-gray-50 dark:bg-gray-700 rounded-xl">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Apariencia</p>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Tema oscuro</span>
                    <button id="theme-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-200 dark:bg-blue-600 transition-colors focus:outline-none">
                        <span id="theme-toggle-knob" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1 dark:translate-x-6"></span>
                    </button>
                </div>
            </div>

            <!-- Menú simplificado - sin login/register -->
            <div class="space-y-1">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-4">Navegación</p>
                <a href="/" data-route class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">
                    Inicio
                </a>
                <a href="/dashboard" data-route class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">
                    Dashboard
                </a>
                <a href="/skills" data-route class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">
                    Mis Skills
                </a>
                <a href="/projects" data-route class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">
                    Proyectos
                </a>
                <a href="/profile" data-route class="block px-4 py-3 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 font-medium transition-colors">
                    Mi Perfil
                </a>
            </div>
        </div>
    </nav>

    <main id="main-content" class="flex-grow"></main>

    <footer class="bg-header-dark text-gray-400 py-4 mt-auto">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>devtrack &copy; 2026 · hecho por developers, para developers</p>
        </div>
    </footer>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
